<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Orientation Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Career Assistant 🤖</div>
        <div class="chatbox" id="chatbox">
            <div class="message bot">Hello! I'm your Career Orientation Assistant. What field of study or career path would you like to explore today?</div>
        </div>
        <div id="typing" class="typing-indicator">Assistant is thinking...</div>
        <div class="input-area">
            <input type="text" id="msg" placeholder="Ask about jobs, studies, or skills..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const chatbox = document.getElementById('chatbox');
        const messageInput = document.getElementById('msg');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typing');

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            if (sender === 'bot') {
                msgDiv.innerHTML = marked.parse(text);
            } else {
                msgDiv.textContent = text;
            }

            chatbox.appendChild(msgDiv);
            chatbox.scrollTop = chatbox.scrollHeight;
        }
        async function typeMessage(text, sender, speed = 15) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            chatbox.appendChild(msgDiv);

            let currentText = '';

            for (let i = 0; i < text.length; i++) {
                currentText += text[i];
                msgDiv.innerHTML = marked.parse(currentText);
                chatbox.scrollTop = chatbox.scrollHeight;
                await new Promise(resolve => setTimeout(resolve, speed));
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            messageInput.value = '';
            appendMessage(message, 'user');
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.reply || "Server Error");
                }

                await typeMessage(data.reply, 'bot');
            } catch (error) {
                appendMessage("Connection error. Please check console and refresh.", "bot");
                console.error('Error:', error);
            } finally {
                typingIndicator.style.display = 'none';
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { 
            if (e.key === 'Enter') sendMessage(); 
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
