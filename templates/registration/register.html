{% extends 'base.html' %}

{% block title %}Inscription{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>Inscription</h1>
    
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">S'inscrire</button>
    </form>
    
    <p>Déjà un compte? <a href="{% url 'login' %}">Se connecter</a></p>
</div>
{% endblock %}
