<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section 6 - Financial & Languages</title>
    <link rel="stylesheet" href="/static/css/section1.css">
</head>
<body>
<div class="section1-page">

    <h1>Section 6</h1>
    <h2>SECTION: FINANCIAL CAPACITY</h2>

    <div class="section1-shell">

    <div class="section1-card">

    <form method="POST">
        {% csrf_token %}

        <p>28. Are you able to invest in further studies or certifications?</p>

        <label><input type="radio" name="q28" value="yes" required> Yes</label><br>
        <label><input type="radio" name="q28" value="limited"> Limited budget</label><br>
        <label><input type="radio" name="q28" value="no"> No</label><br><br>

        <h2>SECTION: LANGUAGES</h2>

        <p>29. What languages do you speak fluently? (Multiple choice)</p>
        <label><input type="checkbox" name="q29" value="arabic"> Arabic</label><br>
        <label><input type="checkbox" name="q29" value="french"> French</label><br>
        <label><input type="checkbox" name="q29" value="english"> English</label><br>
        <label><input type="checkbox" name="q29" value="german"> German</label><br>
        <label><input type="checkbox" name="q29" value="other"> Other</label><br><br>

        <p>30. Which language are you most comfortable using professionally?</p>
        <label><input type="checkbox" name="q30" value="arabic"> Arabic</label><br>
        <label><input type="checkbox" name="q30" value="french"> French</label><br>
        <label><input type="checkbox" name="q30" value="english"> English</label><br><br>

        <button type="submit">See Result</button>

    </form>

</div>
</body>
</html>
