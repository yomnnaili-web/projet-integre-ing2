<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section 8</title>
    <link rel="stylesheet" href="/static/css/section1.css">
</head>
<body>
<div class="section1-page">

<div class="section1-shell">

<div class="section1-card">

<p class="section1-q" style="margin-top:0;">Full name:</p>
<input class="section1-input" type="text" name="full_name" required><br><br>

<p class="section1-q">Email:</p>
<input class="section1-input" type="email" name="email" required><br><br>

<div class="section1-field">
    <h2 class="section1-h2">Section : Documents & Matching</h2>

    <!-- Upload CV -->
    <label for="cv">31️ Upload your CV (PDF):</label>
    <input type="file" id="cv" name="cv" accept=".pdf" required>
    <small>Please upload a PDF file (max 5 MB). This helps us match you with jobs and internships.</small>

    <!-- LinkedIn Profile -->
    <label for="linkedin">32️ LinkedIn profile (optional):</label>
    <input type="url" id="linkedin" name="linkedin" placeholder="https://www.linkedin.com/in/yourprofile">

    <!-- Portfolio Link -->
    <label for="portfolio">Portfolio link (optional):</label>
    <input type="url" id="portfolio" name="portfolio" placeholder="https://www.yourportfolio.com">

    <!-- GitHub Profile -->
    <label for="github">GitHub profile (optional):</label>
    <input type="url" id="github" name="github" placeholder="https://github.com/yourusername">

    <!-- Additional Notes -->
    <label for="notes">Additional notes (optional):</label>
    <textarea class="section1-textarea" id="notes" name="notes" placeholder="Add any extra information about your experience or preferences" maxlength="500"></textarea>
<button class="section1-primary" type="submit">Next</button>

</div>
</div>
</div>
</body>
</html>
