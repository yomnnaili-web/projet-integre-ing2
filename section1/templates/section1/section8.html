<p>Full name:</p>
<input type="text" name="full_name" required><br><br>

<p>Email:</p>
<input type="email" name="email" required><br><br>
<div class="section">
    <h2>Section : Documents & Matching</h2>

    <!-- Upload CV -->
    <label for="cv">31️ Upload your CV (PDF):</label>
    <input type="file" id="cv" name="cv" accept=".pdf" required>
    <small>Please upload a PDF file (max 5 MB). This helps us match you with jobs and internships.</small>

    <!-- LinkedIn Profile -->
    <label for="linkedin">32️ LinkedIn profile (optional):</label>
    <input type="url" id="linkedin" name="linkedin" placeholder="https://www.linkedin.com/in/yourprofile">

    <!-- Portfolio Link -->
    <label for="portfolio">Portfolio link (optional):</label>
    <input type="url" id="portfolio" name="portfolio" placeholder="https://www.yourportfolio.com">

    <!-- GitHub Profile -->
    <label for="github">GitHub profile (optional):</label>
    <input type="url" id="github" name="github" placeholder="https://github.com/yourusername">

    <!-- Additional Notes -->
    <label for="notes">Additional notes (optional):</label>
    <textarea id="notes" name="notes" placeholder="Add any extra information about your experience or preferences" maxlength="500"></textarea>
        <button type="submit">Next</button>

</div>
